<title>PeopleFirst · Home (Leader + Employee)</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  :root {
    /* AI-layer accent defaults (Sky / JioCloud) — overridden per-tweak at runtime */
    --sky: oklch(62% 0.145 236);
    --sky-ink: oklch(36% 0.105 236);
    --sky-light: oklch(95.5% 0.032 236);
    --sky-border: oklch(88% 0.052 236);
    --sky-shadow: oklch(62% 0.145 236 / 0.45);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: oklch(93% .012 264);
    display: flex; align-items: flex-start; justify-content: center;
    padding: 28px 16px; min-height: 100vh;
  }
  button { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .jds-icon svg { width: 100%; height: 100%; display: block; }
  @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes sheetIn { from { transform: translateY(100%); } to { transform: none; } }
  @keyframes sheetDown { from { transform: translateY(-100%); } to { transform: none; } }
  @keyframes chatDot { 0%, 60%, 100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }
  @keyframes splashRise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes splashBar { from { width: 0; } to { width: 100%; } }
  @keyframes sklnShimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  .skln { background: linear-gradient(90deg, var(--surface-subtle) 25%, color-mix(in oklch, var(--surface-subtle) 55%, white) 37%, var(--surface-subtle) 63%); background-size: 200% 100%; animation: sklnShimmer 1.3s ease-in-out infinite; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(.94); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes drawStroke {
    from { stroke-dashoffset: 600; }
    to   { stroke-dashoffset: 0; }
  }
  @keyframes barFill {
    from { width: 0 !important; }
  }
  @keyframes badgePop {
    0%   { transform: scale(0) rotate(-12deg); opacity: 0; }
    70%  { transform: scale(1.18) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  @keyframes sparkPulse {
    0%, 100% { box-shadow: 0 2px 6px -1px var(--sky-shadow), 0 0 0 0 var(--sky-shadow); }
    50%       { box-shadow: 0 2px 6px -1px var(--sky-shadow), 0 0 14px 4px var(--sky-shadow); }
  }
  @keyframes countUp { }
  @keyframes presenceSeg {
    from { flex: 0 !important; min-width: 0 !important; }
  }
  @keyframes dotPop {
    0%   { transform: scale(0); }
    70%  { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* Button press feedback */
  button:not([disabled]):active { transform: scale(.96) !important; }
  button { transition: transform .1s ease, filter .15s ease, background .15s ease; }
  button:not([disabled]):hover { filter: brightness(.95); }

  /* Nav badge pop */
  .nav-badge { animation: badgePop .45s cubic-bezier(.34,1.56,.64,1) 1s both; }

  /* AI sparkle glow pulse */
  .ai-sparkle { animation: sparkPulse 2.8s ease-in-out infinite; }

  /* Sparkline SVG draw-on */
  .sparkline-line {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    animation: drawStroke 1s cubic-bezier(.2,0,0,1) .7s both;
  }
  .sparkline-dot {
    opacity: 0;
    animation: fadeIn .3s ease 1.5s both;
  }
  .sparkline-area {
    opacity: 0;
    animation: fadeIn .6s ease .5s both;
  }

  /* Signal badges fade in */
  .signal-pill { animation: fadeIn .3s ease both; }

  /* Presence bar segments */
  .presence-seg {
    animation: presenceSeg .65s cubic-bezier(.2,0,0,1) both;
  }
  .presence-seg:nth-child(1) { animation-delay: .35s; }
  .presence-seg:nth-child(2) { animation-delay: .55s; }
  .presence-seg:nth-child(3) { animation-delay: .7s; }
  .presence-seg:nth-child(4) { animation-delay: .82s; }

  /* Progress bars animated fill */
  .anim-bar {
    animation: barFill .8s cubic-bezier(.2,0,0,1) both;
  }
</style>
